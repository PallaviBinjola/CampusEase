<!-- templates/my_posts.html -->
{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
  <h3>My Lost & Found Posts</h3>
  <hr>
  {% for post in my_posts %}
  <div class="card mb-3">
    <div class="card-body">
      <h5>{{ post.name }}</h5>
      <p>{{ post.description }}</p>
      <p>Status: <strong>{{ post.status }}</strong></p>
      <p>Location: {{ post.location }}</p>
      <p>Contact: {{ post.contact }}</p>

      <a href="{{ url_for('edit_post', item_id=post.id) }}" class="btn btn-warning btn-sm">Edit</a>
      <form action="{{ url_for('delete_post', item_id=post.id) }}" method="POST" style="display:inline;">
        <button type="submit" class="btn btn-danger btn-sm"
          onclick="return confirm('Are you sure you want to delete this post?');">Delete</button>
      </form>
    </div>
  </div>
  {% else %}
  <p>No posts found.</p>
  {% endfor %}
</div>
{% endblock %}
