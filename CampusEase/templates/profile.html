<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile | CampusEase</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <style>
    body {
      background: #f5f7fa;
      font-family: 'Poppins', sans-serif;
    }
    .profile-card {
      max-width: 700px;
      margin: 50px auto;
      background: white;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }
    .profile-header {
      background: linear-gradient(135deg, #007bff, #00b4d8);
      color: white;
      text-align: center;
      padding: 30px 20px;
    }
    .profile-header img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid #fff;
      object-fit: cover;
    }
    .profile-header h3 {
      margin-top: 15px;
      font-weight: 600;
    }
    .form-control, .form-select {
      border-radius: 10px;
    }
    .btn-save {
      background: linear-gradient(135deg, #007bff, #00b4d8);
      color: white;
      border: none;
      border-radius: 10px;
      transition: 0.3s;
    }
    .btn-save:hover {
      background: linear-gradient(135deg, #0056b3, #007bff);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="profile-card">
      <div class="profile-header">
        <img
          src="{{ url_for('static', filename=user.profile_pic if user.profile_pic else 'profile_pics/default.png') }}"
          alt="Profile Picture"
        />
        <h3>{{ user.name }}</h3>
        <p>{{ user.email }}</p>
      </div>
      <div class="p-4">
        <form method="POST" enctype="multipart/form-data">
          <div class="mb-3">
            <label class="form-label">Upload New Profile Picture</label>
            <input type="file" name="profile_pic" class="form-control" />
          </div>

          <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input
              type="text"
              name="phone"
              class="form-control"
              value="{{ user.phone or '' }}"
            />
          </div>

          <div class="mb-3">
            <label class="form-label">Gender</label>
            <select name="gender" class="form-select">
              <option value="">Select Gender</option>
              <option value="Male" {% if user.gender == 'Male' %}selected{% endif %}>Male</option>
              <option value="Female" {% if user.gender == 'Female' %}selected{% endif %}>Female</option>
              <option value="Other" {% if user.gender == 'Other' %}selected{% endif %}>Other</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Date of Birth</label>
            <input
              type="date"
              name="dob"
              class="form-control"
              value="{{ user.dob or '' }}"
            />
          </div>

          <div class="text-center">
            <button type="submit" class="btn btn-save px-5 py-2">
              Save Changes
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
