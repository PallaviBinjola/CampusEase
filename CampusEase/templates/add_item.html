{% extends 'base.html' %}

{% block title %}Add Lost/Found Item | CampusEase{% endblock %}

{% block content %}
<h1 class="text-3xl font-bold mb-6 text-gray-800">Add Lost or Found Item</h1>

<form action="{{ url_for('add_item') }}" method="POST" enctype="multipart/form-data" class="bg-white shadow-md rounded-lg p-6 max-w-lg mx-auto">
    
    <!-- Title -->
    <div class="mb-4">
        <label for="title" class="block text-gray-700 font-medium mb-2">Item Title <span class="text-red-500">*</span></label>
        <input type="text" name="title" id="title" required 
               class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <!-- Description -->
    <div class="mb-4">
        <label for="description" class="block text-gray-700 font-medium mb-2">Description</label>
        <textarea name="description" id="description" rows="4" 
                  class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
    </div>

    <!-- Category -->
    <div class="mb-4">
        <label for="category" class="block text-gray-700 font-medium mb-2">Category <span class="text-red-500">*</span></label>
        <select name="category" id="category" required 
                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="">-- Select --</option>
            <option value="lost">Lost</option>
            <option value="found">Found</option>
        </select>
    </div>

    <!-- Image Upload -->
    <div class="mb-4">
        <label for="image" class="block text-gray-700 font-medium mb-2">Upload Image (optional)</label>
        <input type="file" name="image" id="image" accept="image/*"
               class="w-full text-gray-600">
    </div>

    <!-- Submit Button -->
    <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">
        Add Item
    </button>
</form>
{% endblock %}
