<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | CampusEase</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .register-card {
      background: white;
      border-radius: 15px;
      padding: 40px;
      box-shadow: 0px 10px 25px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 450px;
    }
    .btn-primary {
      background-color: #2575fc;
      border: none;
    }
    .btn-primary:hover {
      background-color: #1a5fd7;
    }
  </style>
</head>
<body>

  <div class="register-card">
    <h3 class="text-center mb-4 text-primary fw-bold">Create an Account</h3>
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" name="name" class="form-control" required placeholder="Enter your name">
      </div>

      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" required placeholder="Enter your email">
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" required placeholder="Enter password"></div>
        <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="confirm_password" class="form-control" required placeholder="Confirm Password" required>
        </div>
      

      <div class="mb-3">
        <label class="form-label">Role</label>
        <select name="role" class="form-select" required>
          <option value="" disabled selected>Select Role</option>
          <option value="user">User</option>
          <option value="admin">Admin</option>
          <option value="canteen">Canteen</option>
        </select>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2">Register</button>

      <p class="text-center mt-3">
        Already have an account?
        <a href="{{ url_for('login') }}" class="text-decoration-none text-primary fw-semibold">Login here</a>
      </p>
    </form>
  </div>

</body>
</html>
